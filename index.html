<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Name Picker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; }
        textarea { width: 80%; height: 150px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { padding: 15px 30px; margin-top: 15px; font-size: 18px; background-color: #2ea44f; color: white; border: none; border-radius: 6px; cursor: pointer; width: 80%; }
        #result { margin-top: 25px; font-weight: bold; font-size: 1.5rem; color: #d73a49; min-height: 40px; }
    </style>
</head>
<body>

    <h1>Group Generator</h1>
    <p>Enter names (one per line):</p>
    
    <textarea id="nameList" placeholder="Enter names here..."></textarea>
    <br>
    <button onclick="pickName()">Pick a Random Person</button>
    
    <div id="result"></div>

    <script>
        function pickName() {
            const text = document.getElementById('nameList').value;
            const names = text.split('\n').filter(name => name.trim() !== "");
            
            if (names.length === 0) {
                document.getElementById('result').innerText = "Please enter some names first!";
                return;
            }

            const random = names[Math.floor(Math.random() * names.length)];
            document.getElementById('result').innerText = "Winner: " + random;
        }
    </script>

</body>
</html>
